<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Microphone dB Logger</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 100%;
            text-align: center;
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
            font-size: 2em;
        }

        .controls {
            margin-bottom: 30px;
        }

        input[type="number"], input[type="range"] {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 2px solid #e1e5e9;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input[type="number"]:focus, input[type="range"]:focus {
            outline: none;
            border-color: #667eea;
        }

        input[type="range"] {
            padding: 5px 0;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin: 10px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .status {
            margin: 20px 0;
            padding: 15px;
            border-radius: 10px;
            font-weight: 600;
            min-height: 20px;
        }

        .status.idle { background: #e8f5e8; color: #2d5a2d; }
        .status.recording { background: #fff3cd; color: #856404; }
        .status.error { background: #f8d7da; color: #721c24; }
        .status.complete { background: #d4edda; color: #155724; }

        .live-data {
            margin: 20px 0;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
        }

        .db-meter {
            width: 100%;
            height: 20px;
            background: #e9ecef;
            border-radius: 10px;
            overflow: hidden;
            margin: 10px 0;
        }

        .db-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff6b6b, #feca57, #48dbfb, #ff9ff3);
            width: 0%;
            transition: width 0.1s;
        }

        .current-db {
            font-size: 2em;
            font-weight: bold;
            color: #333;
            margin: 10px 0;
        }

        .timer-display {
            font-size: 1.2em;
            font-weight: 600;
            color: #666;
            margin: 10px 0;
        }

        .data-table {
            margin-top: 20px;
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        .data-table th, .data-table td {
            padding: 8px;
            text-align: left;
            border-bottom: 1px solid #dee2e6;
        }

        .data-table th {
            background: #f8f9fa;
            font-weight: 600;
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }
            
            h1 {
                font-size: 1.5em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎤 dB Logger</h1>
        
        <div class="controls">
            <label>Duration:</label>
            <input type="range" id="duration" min="5" max="3600" value="30" step="5">
            <div style="display: flex; gap: 10px; align-items: center; justify-content: center; margin: 10px 0;">
                <input type="number" id="durationNum" min="5" max="3600" value="30" step="5" style="width: 120px;">
                <span id="durationLabel">00:30</span>
            </div>
            
            <div style="margin: 20px 0;">
                <button id="startBtn">Start Recording</button>
                <button id="stopBtn" disabled>Stop Recording</button>
                <button id="downloadBtn" disabled>Download CSV</button>
            </div>
        </div>

        <div id="status" class="status idle">Ready to record microphone levels (max 1 hour)</div>
        
        <div id="liveData" class="live-data" style="display: none;">
            <div class="current-db" id="currentDb">-- dB</div>
            <div class="db-meter">
                <div class="db-fill" id="dbFill"></div>
            </div>
            <div class="timer-display">
                Time elapsed: <span id="elapsedTime">00:00</span> / <span id="totalTime">00:30</span>
            </div>
            <div>Samples recorded: <span id="sampleCount">0</span></div>
        </div>

        <div id="dataPreview">
            <table class="data-table" style="display: none;">
                <thead>
                    <tr>
                        <th>Time (s)</th>
                        <th>dB Level</th>
                    </tr>
                </thead>
                <tbody id="dataTableBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        class DBLogger {
            constructor() {
                this.audioContext = null;
                this.analyser = null;
                this.dataArray = null;
                this.mediaStream = null;
                this.isRecording = false;
                this.recordings = [];
                this.sampleRate = 0;
                this.startTime = 0;
                this.durationMs = 0;
                
                this.initElements();
                this.bindEvents();
            }

            initElements() {
                this.startBtn = document.getElementById('startBtn');
                this.stopBtn = document.getElementById('stopBtn');
                this.downloadBtn = document.getElementById('downloadBtn');
                this.durationSlider = document.getElementById('duration');
                this.durationNum = document.getElementById('durationNum');
                this.durationLabel = document.getElementById('durationLabel');
                this.status = document.getElementById('status');
                this.liveData = document.getElementById('liveData');
                this.currentDb = document.getElementById('currentDb');
                this.dbFill = document.getElementById('dbFill');
                this.sampleCount = document.getElementById('sampleCount');
                this.elapsedTime = document.getElementById('elapsedTime');
                this.totalTime = document.getElementById('totalTime');
                this.dataTableBody = document.getElementById('dataTableBody');
                this.dataPreview = document.getElementById('dataPreview');
            }

            bindEvents() {
                this.startBtn.addEventListener('click', () => this.startRecording());
                this.stopBtn.addEventListener('click', () => this.stopRecording());
                this.downloadBtn.addEventListener('click', () => this.downloadCSV());
                
                this.durationSlider.addEventListener('input', (e) => {
                    const value = parseInt(e.target.value);
                    this.durationNum.value = value;
                    this.updateDurationLabel(value);
                });
                
                this.durationNum.addEventListener('input', (e) => {
                    let value = parseInt(e.target.value);
                    value = Math.max(5, Math.min(3600, value));
                    this.durationNum.value = value;
                    this.durationSlider.value = value;
                    this.updateDurationLabel(value);
                });
            }

            updateDurationLabel(seconds) {
                const mins = Math.floor(seconds / 60);
                const secs = seconds % 60;
                this.durationLabel.textContent = 
                    `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
                this.totalTime.textContent = this.durationLabel.textContent;
            }

            formatTime(seconds) {
                const mins = Math.floor(seconds / 60);
                const secs = seconds % 60;
                return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            }

            async startRecording() {
                try {
                    this.setStatus('Requesting microphone access...', 'recording');
                    
                    this.mediaStream = await navigator.mediaDevices.getUserMedia({ 
                        audio: {
                            echoCancellation: false,
                            noiseSuppression: false,
                            autoGainControl: false
                        }
                    });

                    this.audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    this.sampleRate = this.audioContext.sampleRate;
                    
                    const source = this.audioContext.createMediaStreamSource(this.mediaStream);
                    this.analyser = this.audioContext.createAnalyser();
                    this.analyser.fftSize = 256;
                    this.dataArray = new Uint8Array(this.analyser.frequencyBinCount);
                    
                    source.connect(this.analyser);
                    
                    this.recordings = [];
                    this.isRecording = true;
                    this.startTime = performance.now();
                    this.durationMs = parseInt(this.durationSlider.value) * 1000;
                    
                    this.updateButtons(true);
                    this.liveData.style.display = 'block';
                    this.setStatus('Recording... Speak into your microphone!', 'recording');
                    
                    this.recordLoop();

                } catch (err) {
                    console.error('Error starting recording:', err);
                    this.setStatus('Microphone access denied or error occurred', 'error');
                }
            }

            recordLoop() {
                if (!this.isRecording) return;

                this.analyser.getByteFrequencyData(this.dataArray);
                
                let sum = 0;
                for (let i = 0; i < this.dataArray.length; i++) {
                    sum += this.dataArray[i] * this.dataArray[i];
                }
                const rms = Math.sqrt(sum / this.dataArray.length);
                const db = 20 * Math.log10(Math.max(rms / 255, 0.001));
                
                const timestamp = Date.now();
                const elapsed = (this.recordings.length / 10).toFixed(1);
                this.recordings.push({
                    timestamp,
                    time: elapsed,
                    db: Math.max(-60, Math.round(db * 10) / 10)
                });

                // Update elapsed time
                const elapsedMs = performance.now() - this.startTime;
                const elapsedSeconds = Math.floor(elapsedMs / 1000);
                this.elapsedTime.textContent = this.formatTime(elapsedSeconds);

                this.updateLiveDisplay(db);
                this.sampleCount.textContent = this.recordings.length.toLocaleString();

                requestAnimationFrame(() => this.recordLoop());
            }

            updateLiveDisplay(db) {
                this.currentDb.textContent = `${Math.max(-60, Math.round(db * 10) / 10)} dB`;
                const normalized = Math.max(0, Math.min(100, ((db + 60) / 60) * 100));
                this.dbFill.style.width = `${normalized}%`;
            }

            stopRecording() {
                this.isRecording = false;
                
                if (this.mediaStream) {
                    this.mediaStream.getTracks().forEach(track => track.stop());
                }
                
                if (this.audioContext) {
                    this.audioContext.close();
                }
                
                this.updateButtons(false);
                this.liveData.style.display = 'none';
                
                if (this.recordings.length > 0) {
                    this.setStatus(`Recording complete! ${this.recordings.length.toLocaleString()} samples recorded`, 'complete');
                    this.downloadBtn.disabled = false;
                    this.updateDataPreview();
                } else {
                    this.setStatus('No data recorded', 'idle');
                }
            }

            updateButtons(recording) {
                this.startBtn.disabled = recording;
                this.stopBtn.disabled = !recording;
            }

            setStatus(message, type) {
                this.status.textContent = message;
                this.status.className = `status ${type}`;
            }

            updateDataPreview() {
                this.dataTableBody.innerHTML = '';
                const recentSamples = this.recordings.slice(-10);
                
                recentSamples.forEach((sample) => {
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td>${parseFloat(sample.time).toFixed(1)}s</td>
                        <td>${sample.db} dB</td>
                    `;
                    this.dataTableBody.appendChild(row);
                });
                
                this.dataPreview.querySelector('table').style.display = 'table';
            }

            downloadCSV() {
                if (this.recordings.length === 0) return;

                const headers = ['Timestamp', 'Time_s', 'dB_Level'];
                const csvContent = [
                    headers.join(','),
                    ...this.recordings.map(r => 
                        [r.timestamp, parseFloat(r.time).toFixed(1), r.db].join(',')
                    )
                ].join('\n');

                const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `mic_db_recording_${new Date().toISOString().slice(0,19).replace(/:/g,'-')}.csv`;
                document.body.appendChild(a);
                a.click();
                window.URL.revokeObjectURL(url);
                document.body.removeChild(a);
            }
        }

        window.addEventListener('load', () => {
            window.dbLogger = new DBLogger();
        });

        document.addEventListener('visibilitychange', () => {
            if (document.hidden && window.dbLogger?.isRecording) {
                window.dbLogger.stopRecording();
            }
        });
    </script>
</body>
</html>
